name: Chore reminders (web push)

# Vercel Hobby limits crons to daily; chore reminders need ~15-min cadence.
# This just pokes the secured Vercel endpoint — all logic lives server-side.
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call reminder endpoint
        run: |
          curl -sf -m 60 \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://homebase-blond.vercel.app/api/cron/chore-reminders
